[project.theme]
variant = "modern"          # modern design language
custom_dir = "overrides"
logo = "assets/daemonless-logo.svg"
favicon = "assets/favicon.ico"
features = [
  "navigation.tabs",
  "navigation.tabs.sticky", # sticky header tabs
  # navigation.instant intentionally OFF: the post-build placeholder plugin
  # (markdown-placeholder-standalone) builds its settings panel against the DOM
  # on load; with SPA instant nav it races the content swap and the panel lands
  # at the top of the page until a manual "Reset all placeholders". Full page
  # loads keep the @PLACEHOLDER@ panel in its correct spot.
  "navigation.top",          # back to top button
  "navigation.tracking",     # highlight nav as you scroll
  "search.highlight",
  "search.suggest",          # instant search suggestions
  "toc.follow",              # scroll sync
  "toc.integrate",           # show page TOC in the left sidebar (LSIO-style)
  "content.code.copy",
  "content.code.annotate",   # interactive code annotations
  "content.tabs.link",       # sync tab selection across pages
  "search.share",            # shareable search links
  "navigation.path",         # breadcrumbs
  "navigation.footer",       # previous/next buttons at the bottom of pages
]

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "red"
accent = "red"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "red"
accent = "red"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to dark mode"

[project.extra]
generator = false
announce = "🚀 Daemonless Docs 2.0 is live! 100% powered by Zensical."

# Google Analytics — restored after the mkdocs→zensical migration dropped it.
[project.extra.analytics]
provider = "google"
property = "G-Z0TYZ35R6G"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/daemonless"
name = "GitHub"

[[project.extra.social]]
icon = "material/check-circle"
link = "https://ci.daemonless.io"
name = "CI Status"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.com/invite/Kb9tkhecZT"
name = "Discord Community"

[project.plugins]
search = {}
social = { cards_layout_options = { background_color = "#1e1e24" } }

# Markdown extensions — attr_list is REQUIRED for zip-bundle to read the
# data-zip-* attributes on code blocks.
[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
linenums = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.magiclink]
repo_url_shorthand = true
user = "daemonless"
repo = "daemonless"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

# Material icons / emoji shortcodes (e.g. :simple-adguard:). Zensical uses the
# `zensical.extensions.emoji.*` namespace (string), not the MkDocs
# `!!python/name:material.extensions.emoji.*` hooks.
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
