site_name: daemonless
site_url: https://daemonless.io
site_description: Native FreeBSD OCI Containers - Jails without the System Administration
repo_url: https://github.com/daemonless/daemonless
repo_name: daemonless/daemonless

theme:
  name: material
  logo: assets/daemonless-logo.svg
  favicon: assets/favicon.ico
  palette:
    scheme: slate
    primary: red
    accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  custom_dir: overrides

extra:
  generator: false
  analytics:
    provider: google
    property: G-Z0TYZ35R6G
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/daemonless
    - icon: material/check-circle
      link: https://ci.daemonless.io
      name: CI Status
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/Kb9tkhecZT
      name: Discord Community

extra_css:
  - stylesheets/extra.css
  - stylesheets/ux-overrides.css
  - https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/css/splide.min.css
  - https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css

extra_javascript:
  - javascripts/ux-settings-v2.js
  - https://cdn.jsdelivr.net/npm/@splidejs/splide@4/dist/js/splide.min.js
  - https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js
  - javascripts/splide-init.js


markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - zip-bundle
  - social:
      cards_layout_options:
        background_color: "#1a1a1a"
        color: "#ff5555"
  - placeholder:
      placeholder_file: placeholder-plugin.yaml
  - redirects:
      redirect_maps:
        quick-start.md: guides/quick-start.md
        guides/cit.md: guides/dbuild/cit.md
        guides/ci-cd.md: guides/dbuild/ci.md
        guides/linux-pre-build.md: guides/dbuild/linux-pre-build.md

nav:
  - Home: index.md
  - Image Fleet:
    - Overview: images/index.md
    - Version Status: status.md
  - Guides:
      - Getting Started: guides/quick-start.md
      - Permissions: guides/permissions.md
      - Networking: guides/networking.md
      - ZFS Storage: guides/zfs.md
      - ocijail Patch: guides/ocijail-patch.md
      - Operations: guides/operations.md
  - Contributing:
      - Quickstart: guides/contributing-quickstart.md
      - Development Guide: guides/development.md
      - Image Tagging: guides/tagging.md
      - OCI Compliance: guides/oci-compliance.md
  - dbuild (Daemonless Build):
      - Overview: guides/dbuild/index.md
      - Building Your First Image: guides/dbuild/workflow.md
      - Command Reference: guides/dbuild/commands.md
      - Configuration: guides/dbuild/config.md
      - CI/CD Integration:
          - Pipeline: guides/dbuild/ci.md
          - Linux Pre-Build Artifacts: guides/dbuild/linux-pre-build.md
      - Quality Gates (CIT): guides/dbuild/cit.md
  - About:
      - Philosophy: philosophy.md
      - Architecture: architecture.md
      - Community: community.md
